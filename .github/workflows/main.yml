name: Build

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]
  workflow_dispatch:

env:
  HAXE_VERSION: 4.3.4

jobs:
  build-desktop:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        arch: [32, 64]
        exclude:
          - os: macos-latest
            arch: 32
          - os: ubuntu-latest
            arch: 32
        include:
          - os: macos-latest
            arch: arm64
    runs-on: ${{ matrix.os }}
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: krdlab/setup-haxe@v2
        with:
          haxe-version: ${{ env.HAXE_VERSION }}
      
      - name: Cache Haxelib dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/haxelib
            ~/.hxcpp
            C:/haxelib
            C:/.hxcpp
          key: ${{ runner.os }}-haxelib-${{ hashFiles('**/Project.xml') }}
          restore-keys: |
            ${{ runner.os }}-haxelib-
      
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libvlc-dev libvlccore-dev libgl1-mesa-dev libglu1-mesa-dev g++-multilib gcc-multilib
      
      - name: Install Haxelib (Unix)
        if: runner.os != 'Windows'
        run: |
          haxelib setup ~/haxelib
          haxelib install hxcpp --quiet
          chmod +x ./setup/unish-lib.sh
          sh ./setup/unish-lib.sh
      
      - name: Install Haxelib (Windows)
        if: runner.os == 'Windows'
        run: |
          haxelib setup C:/haxelib
          haxelib install hxcpp --quiet
          .\setup\windows-lib.bat
        shell: cmd
      
      - name: Skip SScript setup mode (Unix)
        if: runner.os != 'Windows'
        run: echo -n 'oy9:showMacroty8:loopCosti25y10:includeAllfg' > ~/settings.cocoa
      
      - name: Skip SScript setup mode (Windows)
        if: runner.os == 'Windows'
        run: echo oy9:showMacroty8:loopCosti25y10:includeAllfg > %USERPROFILE%\settings.cocoa
        shell: cmd
      
      - name: Enable HXCPP compile cache
        run: |
          echo "HXCPP_COMPILE_CACHE=${{ runner.os == 'Windows' && 'C:/.hxcpp' || '~/.hxcpp' }}" >> $GITHUB_ENV
        shell: bash
      
      - name: Create Version Tag
        run: echo "${{ github.run_id }}" > VERSION
      
      - name: Build Linux
        if: runner.os == 'Linux'
        run: haxelib run lime build linux -${{ matrix.arch }}bits --app-version="4.0.0-${{ github.run_id }}" -D officialBuild
      
      - name: Build Windows
        if: runner.os == 'Windows'
        run: haxelib run lime build windows -${{ matrix.arch }}bits --app-version="4.0.0-${{ github.run_id }}" -D officialBuild
      
      - name: Build macOS (x64)
        if: runner.os == 'macOS' && matrix.arch == 64
        run: haxelib run lime build mac -64 --app-version="4.0.0-${{ github.run_id }}" -D officialBuild
      
      - name: Build macOS (ARM)
        if: runner.os == 'macOS' && matrix.arch == 'arm64'
        run: haxelib run lime build mac -arm64 --app-version="4.0.0-${{ github.run_id }}" -D officialBuild
      
      - name: Publish Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ runner.os }}-${{ matrix.arch }}
          path: export/release/**/bin

  build-mobile:
    strategy:
      matrix:
        include:
          - platform: android
            arch: armv7
            os: ubuntu-latest
          - platform: android
            arch: arm64
            os: ubuntu-latest
          - platform: ios
            os: macos-15
    runs-on: ${{ matrix.os }}
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: krdlab/setup-haxe@v2
        with:
          haxe-version: ${{ env.HAXE_VERSION }}
      
      - name: Setup Java (Android)
        if: matrix.platform == 'android'
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      
      - name: Setup Android SDK
        if: matrix.platform == 'android'
        uses: android-actions/setup-android@v3
      
      - name: Install Android NDK
        if: matrix.platform == 'android'
        run: |
          sdkmanager --sdk_root=$ANDROID_SDK_ROOT "platforms;android-35" "build-tools;35.0.0" "ndk;27.0.12077973" "cmdline-tools;latest"
          echo "ANDROID_NDK_ROOT=$ANDROID_SDK_ROOT/ndk/27.0.12077973" >> $GITHUB_ENV
      
      - name: Cache Haxelib dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/haxelib
            ~/.hxcpp
          key: ${{ runner.os }}-${{ matrix.platform }}-haxelib-${{ hashFiles('**/Project.xml') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.platform }}-haxelib-
      
      - name: Install Haxelib
        run: |
          haxelib setup ~/haxelib
          haxelib install hxcpp --quiet
          chmod +x ./setup/unish-lib.sh
          sh ./setup/unish-lib.sh
      
      - name: Setup Lime for Android
        if: matrix.platform == 'android'
        run: |
          haxelib run lime setup android
          haxelib run lime config ANDROID_SDK $ANDROID_SDK_ROOT
          haxelib run lime config ANDROID_NDK_ROOT $ANDROID_NDK_ROOT
          haxelib run lime config JAVA_HOME $JAVA_HOME
      
      - name: Skip SScript setup mode
        run: echo -n 'oy9:showMacroty8:loopCosti25y10:includeAllfg' > ~/settings.cocoa
      
      - name: Enable HXCPP compile cache
        run: echo "HXCPP_COMPILE_CACHE=~/.hxcpp" >> $GITHUB_ENV
      
      - name: Create Version Tag
        run: echo "${{ github.run_id }}" > VERSION
      
      - name: Clean old builds
        if: matrix.platform == 'android'
        run: |
          rm -rf export build ~/.gradle
      
      - name: Build Android (ARMv7)
        if: matrix.platform == 'android' && matrix.arch == 'armv7'
        run: haxelib run lime build android -Dlegacy --app-version="4.0.0-${{ github.run_id }}" -D officialBuild -D HXCPP_IGNORE_WARNINGS
      
      - name: Build Android (ARM64)
        if: matrix.platform == 'android' && matrix.arch == 'arm64'
        run: haxelib run lime build android --app-version="4.0.0-${{ github.run_id }}" -D officialBuild -D HXCPP_IGNORE_WARNINGS
      
      - name: Build iOS
        if: matrix.platform == 'ios'
        run: haxelib run lime build ios -nosign --app-version="4.0.0-${{ github.run_id }}" -D officialBuild
      
      - name: Publish Android Artifact
        if: matrix.platform == 'android'
        uses: actions/upload-artifact@v4
        with:
          name: Android-${{ matrix.arch }}
          path: export/release/android/bin
      
      - name: Publish iOS Artifact
        if: matrix.platform == 'ios'
        uses: actions/upload-artifact@v4
        with:
          name: iOS
          path: export/release/ios/build/Release-iphoneos
  
  package-all:
    needs: [build-desktop, build-mobile]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: builds
      
      - name: Display structure
        run: ls -R builds
      
      - name: Create release package
        run: |
          cd builds
          zip -r ../FNF-PlusEngine-${{ github.run_id }}-All-Platforms.zip .
      
      - name: Upload combined package
        uses: actions/upload-artifact@v4
        with:
          name: All-Platforms-Package
          path: FNF-PlusEngine-*.zip